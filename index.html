<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ball Sort Solver</title>
    <style>
        :root {
            --bg: #f0f2f5;
            --beaker-bg: #ffffff;
            --border: #ccc;
        }
        body { font-family: sans-serif; background: var(--bg); display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .controls { margin-bottom: 20px; background: white; padding: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .beakers-container { display: flex; flex-wrap: wrap; gap: 20px; justify-content: center; margin-top: 20px; }
        
        /* Beaker Styling */
        .beaker {
            width: 60px; height: 180px;
            border: 3px solid #555; border-top: none;
            border-bottom-left-radius: 20px; border-bottom-right-radius: 20px;
            background: var(--beaker-bg);
            display: flex; flex-direction: column-reverse; /* Bottom to Top */
            align-items: center; padding: 5px; cursor: pointer; position: relative;
        }
        .beaker:hover { border-color: #007bff; }
        .beaker-label { position: absolute; top: -25px; font-weight: bold; }

        /* Ball Styling */
        .ball {
            width: 45px; height: 40px;
            border-radius: 50%; margin: 2px 0;
            border: 1px solid rgba(0,0,0,0.2);
            display: flex; align-items: center; justify-content: center; color: white; font-size: 10px;
        }

        /* Color Palette */
        .palette { display: flex; gap: 10px; margin-top: 10px; }
        .swatch { width: 30px; height: 30px; border-radius: 50%; cursor: pointer; border: 3px solid transparent; }
        .swatch.active { border-color: #333; transform: scale(1.2); }

        .btn { padding: 8px 16px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 4px; }
        .btn-solve { background: #28a745; font-weight: bold; }
        .results { margin-top: 30px; width: 100%; max-width: 600px; }
        .step { background: white; margin: 5px 0; padding: 10px; border-left: 5px solid #28a745; }
    </style>
</head>
<body>

    <h1>🧪 Ball Sort Solver</h1>

    <div class="controls">
        <div>
            <button class="btn" onclick="addBeaker()">+ Add Beaker</button>
            <button class="btn btn-solve" onclick="solvePuzzle()">Solve Shortest Path</button>
            <button class="btn" style="background:#dc3545" onclick="reset()">Reset</button>
        </div>
        <div class="palette" id="palette">
            <!-- Colors generated by JS -->
        </div>
        <p><small>Click a Beaker to add the selected color. Right-click to remove top ball.</small></p>
    </div>

    <div class="beakers-container" id="beakers-container"></div>

    <div class="results" id="results"></div>

<script>
    const COLORS = ["blue", "red", "black", "white", "green", "orange", "purple", "yellow"];
    let selectedColor = "blue";
    let state = [[], [], [], [], [], [], []]; // 7 beakers default
    const MAX_HEIGHT = 4;

    function init() {
        renderPalette();
        renderBeakers();
    }

    function renderPalette() {
        const p = document.getElementById('palette');
        p.innerHTML = COLORS.map(c => `
            <div class="swatch ${c === selectedColor ? 'active' : ''}" 
                 style="background: ${c}" 
                 onclick="selectedColor='${c}'; renderPalette()"></div>
        `).join('');
    }

    function addBeaker() {
        state.push([]);
        renderBeakers();
    }

    function renderBeakers() {
        const container = document.getElementById('beakers-container');
        container.innerHTML = state.map((beaker, i) => `
            <div class="beaker" onclick="addBall(${i})" oncontextmenu="removeBall(event, ${i})">
                <div class="beaker-label">#${i+1}</div>
                ${beaker.map(color => `<div class="ball" style="background: ${color}"></div>`).join('')}
            </div>
        `).join('');
    }

    function addBall(index) {
        if (state[index].length < MAX_HEIGHT) {
            state[index].push(selectedColor);
            renderBeakers();
        }
    }

    function removeBall(e, index) {
        e.preventDefault();
        state[index].pop();
        renderBeakers();
    }

    function reset() {
        state = state.map(() => []);
        document.getElementById('results').innerHTML = "";
        renderBeakers();
    }

    // --- SOLVER LOGIC (BFS) ---

    function isSolved(currentState) {
        return currentState.every(beaker => {
            if (beaker.length === 0) return true;
            if (beaker.length !== MAX_HEIGHT) return false;
            return beaker.every(ball => ball === beaker[0]);
        });
    }

    function getPossibleMoves(currentState) {
        const moves = [];
        for (let i = 0; i < currentState.length; i++) {
            for (let j = 0; j < currentState.length; j++) {
                if (i === j) continue;
                
                const from = currentState[i];
                const to = currentState[j];

                if (from.length === 0) continue; // Source empty
                if (to.length === MAX_HEIGHT) continue; // Target full

                const ball = from[from.length - 1];
                const targetTop = to[to.length - 1];

                // Rule: Move to empty or move onto same color
                if (to.length === 0 || targetTop === ball) {
                    moves.push({ from: i, to: j });
                }
            }
        }
        return moves;
    }

    function solvePuzzle() {
        const resultsDiv = document.getElementById('results');
        resultsDiv.innerHTML = "Calculating shortest path...";
        
        const queue = [{ state: JSON.parse(JSON.stringify(state)), moves: [] }];
        const visited = new Set();
        visited.add(JSON.stringify(state));

        let found = false;
        let iterations = 0;

        while (queue.length > 0 && iterations < 50000) {
            iterations++;
            const { state: currState, moves } = queue.shift();

            if (isSolved(currState)) {
                displaySolution(moves);
                found = true;
                break;
            }

            const possibleMoves = getPossibleMoves(currState);
            for (const move of possibleMoves) {
                const newState = JSON.parse(JSON.stringify(currState));
                const ball = newState[move.from].pop();
                newState[move.to].push(ball);

                const stateString = JSON.stringify(newState);
                if (!visited.has(stateString)) {
                    visited.add(stateString);
                    queue.push({ state: newState, moves: [...moves, move] });
                }
            }
        }

        if (!found) resultsDiv.innerHTML = "No solution found within limits, or puzzle is impossible.";
    }

    function displaySolution(moves) {
        const resultsDiv = document.getElementById('results');
        resultsDiv.innerHTML = `<h3>Solution found in ${moves.length} moves:</h3>`;
        moves.forEach((m, i) => {
            resultsDiv.innerHTML += `
                <div class="step">
                    <strong>Step ${i + 1}:</strong> Move top ball from 
                    <span style="color:blue">Beaker #${m.from + 1}</span> to 
                    <span style="color:green">Beaker #${m.to + 1}</span>
                </div>`;
        });
    }

    init();
</script>
</body>
</html>
