<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ball Sort Solver - Image Edition</title>
    <style>
        :root { --bg: #eef2f3; --accent: #4a90e2; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 900px; text-align: center; }
        
        .beakers-container { display: flex; flex-wrap: wrap; gap: 15px; justify-content: center; margin: 30px 0; }
        .beaker-wrapper { position: relative; background: #fff; padding: 10px; border-radius: 10px; border: 1px solid #ddd; }
        
        .beaker {
            width: 70px; height: 200px; border: 4px solid #333; border-top: none;
            border-bottom-left-radius: 30px; border-bottom-right-radius: 30px;
            display: flex; flex-direction: column-reverse; align-items: center; padding: 5px; cursor: pointer;
        }
        
        .ball {
            width: 55px; height: 45px; border-radius: 50%; margin: 1px 0;
            background-size: cover; background-position: center; border: 1px solid rgba(0,0,0,0.1);
            display: flex; align-items: center; justify-content: center; font-size: 10px; color: transparent;
        }

        .palette { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin: 20px 0; }
        .swatch { 
            width: 50px; height: 50px; border-radius: 50%; cursor: pointer; border: 3px solid #ddd;
            background-size: cover; background-position: center; position: relative;
        }
        .swatch.active { border-color: var(--accent); transform: scale(1.1); box-shadow: 0 0 10px rgba(74,144,226,0.5); }
        .swatch-label { position: absolute; bottom: -20px; width: 100%; font-size: 10px; color: #666; }

        .btn { padding: 12px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; margin: 5px; transition: 0.3s; }
        .btn-solve { background: #27ae60; color: white; }
        .btn-add { background: var(--accent); color: white; }
        .btn-danger { background: #e74c3c; color: white; }

        .controls-row { display: flex; align-items: center; justify-content: center; gap: 10px; flex-wrap: wrap; }
        #results { width: 100%; max-width: 500px; text-align: left; }
        .step { background: white; margin: 8px 0; padding: 15px; border-left: 8px solid #27ae60; border-radius: 4px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        
        input[type="file"] { display: none; }
        .upload-label { padding: 8px 15px; background: #f3f3f3; border: 1px dashed #aaa; cursor: pointer; border-radius: 5px; font-size: 13px; }
    </style>
</head>
<body>

<div class="card">
    <h1>🧪 Ball Sort Solver (Image Mode)</h1>
    <p>Upload images for your balls, set up the beakers, and find the shortest path!</p>

    <div class="controls-row">
        <button class="btn btn-add" onclick="addBeaker()">+ Add Tube</button>
        <button class="btn btn-solve" onclick="solvePuzzle()">🚀 Find Shortest Path</button>
        <button class="btn btn-danger" onclick="resetAll()">Reset All</button>
    </div>

    <div class="palette" id="palette"></div>
    
    <div class="controls-row" style="margin-top: 20px;">
        <label class="upload-label">
            📷 Upload New Ball Image
            <input type="file" accept="image/*" onchange="handleImageUpload(event)">
        </label>
    </div>
</div>

<div class="beakers-container" id="beakers-container"></div>
<div id="results"></div>

<script>
    let ballTypes = {}; // Stores { id: dataUrl }
    let nextId = 1;
    let selectedId = null;
    let state = [[], [], [], []]; 
    const MAX_HEIGHT = 4;

    // Pre-populate with some colors in case they don't have images
    function addInitialColor(color) {
        const id = 'color_' + nextId++;
        const canvas = document.createElement('canvas');
        canvas.width = 100; canvas.height = 100;
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = color;
        ctx.fillRect(0,0,100,100);
        ballTypes[id] = canvas.toDataURL();
        if(!selectedId) selectedId = id;
    }

    ["#ff4757", "#2ed573", "#1e90ff", "#ffffff", "#2f3542"].forEach(addInitialColor);

    function handleImageUpload(event) {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (e) => {
            const id = 'img_' + nextId++;
            ballTypes[id] = e.target.result;
            selectedId = id;
            renderPalette();
        };
        reader.readAsDataURL(file);
    }

    function renderPalette() {
        const p = document.getElementById('palette');
        p.innerHTML = Object.keys(ballTypes).map(id => `
            <div class="swatch ${id === selectedId ? 'active' : ''}" 
                 style="background-image: url(${ballTypes[id]})" 
                 onclick="selectedId='${id}'; renderPalette()">
            </div>
        `).join('');
    }

    function addBeaker() { state.push([]); renderBeakers(); }
    
    function renderBeakers() {
        const container = document.getElementById('beakers-container');
        container.innerHTML = state.map((beaker, i) => `
            <div class="beaker-wrapper">
                <button style="position:absolute; top:-5px; right:-5px; border-radius:50%; border:none; background:#ff4757; color:white; cursor:pointer" onclick="removeBeaker(${i})">×</button>
                <div style="font-size:12px; font-weight:bold">Tube ${i+1}</div>
                <div class="beaker" onclick="addBall(${i})" oncontextmenu="removeBall(event, ${i})">
                    ${beaker.map(id => `<div class="ball" style="background-image: url(${ballTypes[id]})"></div>`).join('')}
                </div>
            </div>
        `).join('');
    }

    function addBall(i) {
        if (selectedId && state[i].length < MAX_HEIGHT) {
            state[i].push(selectedId);
            renderBeakers();
        }
    }

    function removeBall(e, i) {
        e.preventDefault();
        state[i].pop();
        renderBeakers();
    }

    function removeBeaker(i) { state.splice(i, 1); renderBeakers(); }
    
    function resetAll() {
        state = state.map(() => []);
        document.getElementById('results').innerHTML = "";
        renderBeakers();
    }

    // --- SOLVER ---

    function isSolved(s) {
        return s.every(b => b.length === 0 || (b.length === MAX_HEIGHT && b.every(v => v === b[0])));
    }

    async function solvePuzzle() {
        const resultsDiv = document.getElementById('results');
        resultsDiv.innerHTML = "<h2>Crunching numbers...</h2><p>This may take up to 30 seconds for complex puzzles.</p>";
        await new Promise(r => setTimeout(r, 100));

        const queue = [{ s: state, path: [] }];
        const visited = new Set([JSON.stringify(state)]);
        let found = false;
        let head = 0;

        // BFS with optimized string handling
        while (head < queue.length) {
            const { s, path } = queue[head++];

            if (isSolved(s)) {
                renderSolution(path);
                found = true;
                break;
            }

            if (path.length >= 25) continue; // Limit depth for speed

            // Generate moves
            for (let i = 0; i < s.length; i++) {
                if (s[i].length === 0) continue;
                for (let j = 0; j < s.length; j++) {
                    if (i === j || s[j].length === MAX_HEIGHT) continue;

                    // Any color on any color rule
                    const nextS = s.map((b, idx) => {
                        if (idx === i) return b.slice(0, -1);
                        if (idx === j) return [...b, s[i][s[i].length - 1]];
                        return b;
                    });

                    const key = JSON.stringify(nextS);
                    if (!visited.has(key)) {
                        visited.add(key);
                        queue.push({ s: nextS, path: [...path, { from: i, to: j }] });
                    }
                }
            }
            // Performance Cap
            if (head > 150000) break; 
        }

        if (!found) resultsDiv.innerHTML = "<h3 style='color:red'>No solution found within 25 moves. Check if you have 4 of every color!</h3>";
    }

    function renderSolution(path) {
        const resultsDiv = document.getElementById('results');
        resultsDiv.innerHTML = `<h2>✅ Solution: ${path.length} moves</h2>`;
        path.forEach((m, i) => {
            resultsDiv.innerHTML += `
                <div class="step">
                    <b>Step ${i+1}:</b> Move ball from <b>Tube ${m.from+1}</b> to <b>Tube ${m.to+1}</b>
                </div>`;
        });
        resultsDiv.scrollIntoView({ behavior: 'smooth' });
    }

    renderPalette();
    renderBeakers();
</script>
</body>
</html>
